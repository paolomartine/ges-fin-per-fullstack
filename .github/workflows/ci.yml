
name: CI/CD Fullstack PRO

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build + Test Backend
        run: |
          cd back
          ./mvnw clean verify

      - name: Generar cobertura JaCoCo
        run: |
          cd back
          ./mvnw jacoco:report

      - name: SonarCloud Backend
        run: |
          cd back
          ./mvnw sonar:sonar \
          -Dsonar.projectKey=TU_PROJECT_KEY \
          -Dsonar.organization=TU_ORG
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd front/frontend
          npm install

      - name: Test frontend (coverage)
        run: |
          cd front/frontend
          npm test -- --coverage

      - name: Build frontend
        run: |
          cd front/frontend
          npm run build

      - name: SonarCloud Frontend
        run: |
          cd front/frontend
          npx sonar-scanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # -------- AWS --------
      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Subir a S3
        working-directory: front/frontend
        run: |
          aws s3 sync dist s3://${{ secrets.S3_BUCKET }} --delete

      - name: Invalidar CloudFront
        run: |
          aws cloudfront create-invalidation \
          --distribution-id ${{ secrets.CLOUDFRONT_ID }} \
          --paths "/*"

  deploy-backend:
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Deploy en EC2
        uses: appleboy/ssh-action@v0.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd personalbudget/back
            git pull origin main
            ./mvnw clean package
            sudo systemctl restart app

